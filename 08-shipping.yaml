- name: configuring shipping server
  hosts: shipping
  become: yes
  tasks:
  - name: install maven
    package: 
      name: "{{ item }}"
      state: present
    loop:
    - maven
    - mysql
  - name: create roboshop system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshop system user"
  - name: remove app directory
    file: 
      path: /app
      state: absent
  - name: delete shipping.zip in tmp directory
    file:
      path: /tmp/shipping.zip
      state: absent
  - name: create app directory
    file:
      path: /app 
      state: directory
  - name: download shipping
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
      dest: /tmp/shipping.zip
  - name: unzip shipping
    unarchive:
          src: /tmp/shipping.zip
          dest: /app
          remote_src: yes
  - name: install dependencies
    command: mvn clean package
    args:
      chdir: /app
  - name: move shipping jar
    command: mv target/shipping-1.0.jar shipping.jar
    args:
     chdir: /app
  - name: copy shipping service
    template:
       src: shipping.service.j2 # this is the template which will run in runtime asible will search for service file in run time...ansible executes the variable assigned in service template in run time 
       dest: /etc/systemd/system/shipping.service
  - name: Install python dependencies
    pip:
      name: PyMySql
      executable: pip3.9
  - name: load mysql data
    community.mysql.mysql_db:
      state: import
      name: all
      login_user: root
      login_password: RoboShop@1
      login_host: "{{ MYSQL_HOST }}" # the username and password will conenct to this host nad then it will load below script files
      target: "{{ item }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql
    - /app/db/master-data.sql
  - name: deamon reload
    systemd_service:
      name: shipping
      daemon_reload: true
  - name: enable and start shipping
    service:
      name: shipping
      state: restarted
      enabled: yes
