- name: configuring catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: enable nodejs 20
    command: dnf module disable nodejs -y
  - name: install nodejs 20
    package:
       name: nodejs
       state: present
  - name: create roboshop system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshop system user"
